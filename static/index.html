<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emby 缺集检测系统</title>
    <style>
        /* CSS 变量 - 浅色主题（默认） */
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --container-bg: #ffffff;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border-color: #dddddd;
            --tab-bg: #f8f9fa;
            --tab-hover: #e9ecef;
            --input-bg: #ffffff;
            --card-shadow: 0 20px 60px rgba(0,0,0,0.3);
            --table-header-bg: #f8f9fa;
            --table-row-hover: #f8f9fa;
            --badge-missing-bg: #dc3545;
            --badge-downloading-bg: #ffc107;
            --badge-complete-bg: #28a745;
        }

        /* CSS 变量 - 暗黑主题 */
        body.dark-mode {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --container-bg: #1e1e2e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --border-color: #3a3a4e;
            --tab-bg: #2a2a3e;
            --tab-hover: #3a3a4e;
            --input-bg: #2a2a3e;
            --card-shadow: 0 20px 60px rgba(0,0,0,0.5);
            --table-header-bg: #2a2a3e;
            --table-row-hover: #3a3a4e;
            --badge-missing-bg: #e63946;
            --badge-downloading-bg: #ffb703;
            --badge-complete-bg: #2a9d8f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s ease;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--container-bg);
            border-radius: 16px;
            padding: 30px;
            box-shadow: var(--card-shadow);
            transition: background 0.3s ease, box-shadow 0.3s ease;
        }
        h1 { color: var(--text-primary); margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: var(--text-secondary); margin-bottom: 20px; font-size: 14px; }
        
        /* 标签页 */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        .tab {
            padding: 10px 20px;
            border: none;
            background: var(--tab-bg);
            color: var(--text-primary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .tab:hover { background: var(--tab-hover); }
        .tab.active { background: var(--bg-gradient); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 统计卡片 */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--bg-gradient);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value { font-size: 32px; font-weight: bold; }
        .stat-label { font-size: 14px; opacity: 0.9; margin-top: 5px; }
        
        /* 表单 */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-primary); font-weight: 500; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* 按钮 */
        .btn {
            background: var(--bg-gradient);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-secondary { background: #6c757d; }
        .btn-success { background: #28a745; }
        .btn-sm { padding: 6px 12px; font-size: 13px; }
        
        /* 暗黑模式切换按钮 */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--container-bg);
            border: 2px solid var(--border-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            box-shadow: var(--card-shadow);
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .theme-toggle:hover { transform: scale(1.1); }
        
        /* 媒体库选择 */
        .library-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
        }
        .library-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        .library-item:last-child { border-bottom: none; }
        .library-item:hover { background: var(--tab-hover); }
        .library-item input[type="checkbox"] { margin-right: 10px; }
        .library-info { flex: 1; }
        .library-name { font-weight: 600; color: var(--text-primary); }
        .library-path { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }
        
        /* 列表视图 */
        .list-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-box {
            flex: 1;
            min-width: 200px;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        .filter-select {
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text-primary);
        }
        
        /* 表格 */
        .table-container {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            max-height: calc(100vh - 400px);
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            font-size: 13px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        thead {
            background: var(--bg-gradient);
            color: white;
        }
        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
            color: var(--text-primary);
        }
        td:last-child {
            white-space: normal;
        }
        /* 缺失详情列样式 */
        td:nth-child(8) {
            min-width: 250px;
            max-width: 400px;
        }
        th { font-weight: 600; cursor: pointer; user-select: none; }
        th:hover { opacity: 0.9; }
        th.sorted { background: rgba(255,255,255,0.2); }
        tbody tr {
            background: var(--container-bg);
            transition: all 0.2s ease;
        }
        tbody tr:hover { 
            background: var(--table-row-hover);
            transform: translateX(2px);
        }
        tbody tr:nth-child(even) {
            background: var(--table-header-bg);
        }
        tbody tr:nth-child(even):hover {
            background: var(--table-row-hover);
        }
        
        /* 剧集海报缩略图 */
        .poster-thumb {
            width: 50px;
            height: 75px;
            object-fit: cover;
            border-radius: 4px;
            background: var(--border-color);
        }
        
        /* 状态标签 */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-ongoing { background: #2ed573; color: white; }
        .status-ended { background: #ffa502; color: white; }
        
        /* 缺失集数标签 */
        .missing-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            background: var(--badge-missing-bg);
            color: white;
            font-weight: 600;
            font-size: 13px;
        }
        
        /* 操作按钮 */
        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 0 4px;
        }
        .action-btn-view {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        .action-btn-view:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        .action-btn-download {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.3);
        }
        .action-btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(17, 153, 142, 0.4);
        }
        .action-btn-download:disabled, .action-btn-download.btn-disabled {
            background: linear-gradient(135deg, #cacaca 0%, #e0e0e0 100%);
            color: #888 !important;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        }
        .action-btn-download:hover { background: #218838; }
        .action-btn-download:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        .btn-disabled {
            background: #6c757d !important;
            cursor: not-allowed !important;
        }
        
        /* 下载进度标签 */
        .download-status {
            display: inline-block;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .status-pending { 
            background: linear-gradient(135deg, #ffc107 0%, #ffdb4d 100%); 
            color: #333; 
        }
        .status-downloading { 
            background: linear-gradient(135deg, #17a2b8 0%, #38ef7d 100%); 
            color: white; 
        }
        .status-completed { 
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); 
            color: white; 
        }
        .status-failed { 
            background: linear-gradient(135deg, #dc3545 0%, #ff6b6b 100%); 
            color: white; 
        }
        
        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .page-btn {
            padding: 8px 14px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .page-btn:hover { background: #f8f9fa; }
        .page-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
        }
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }
        .close-btn { font-size: 28px; cursor: pointer; color: #666; }
        .season-list { margin-top: 15px; }
        .season-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .season-title { font-weight: 600; margin-bottom: 8px; color: #333; }
        .missing-eps { color: #ff4757; font-size: 13px; line-height: 1.8; }
        
        .loading { text-align: center; padding: 40px; color: #666; }
        .controls { margin: 20px 0; }
        .alert {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            th, td { padding: 8px 10px; font-size: 13px; }
            .poster-thumb { width: 40px; height: 60px; }
        }
    </style>
</head>
<body>
    <!-- 暗黑模式切换按钮 -->
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题">🌙</button>
    
    <div class="container">
        <h1>📺 Emby 缺集检测系统</h1>
        <p class="subtitle">列表视图 · 媒体库过滤 · 自动检测 · 智能去重</p>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('dashboard')">📊 仪表盘</button>
            <button class="tab" onclick="switchTab('settings')">⚙️ 配置</button>
        </div>
        
        <!-- 仪表盘 -->
        <div id="dashboard" class="tab-content active">
            <div class="stats-bar">
                <div class="stat-card">
                    <div class="stat-value" id="totalSeries">-</div>
                    <div class="stat-label">剧集总数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="missingSeries">-</div>
                    <div class="stat-label">有缺集的剧集</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalMissing">-</div>
                    <div class="stat-label">缺失总集数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="lastUpdate">-</div>
                    <div class="stat-label">最后更新</div>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn" id="detectBtn" onclick="runDetection()">🔍 开始检测</button>
                <button class="btn btn-secondary" onclick="loadData()">🔄 刷新列表</button>
            </div>
            
            <!-- 列表控制 -->
            <div class="list-controls">
                <input type="text" class="search-box" id="searchBox" placeholder="🔍 搜索剧名..." oninput="filterData()">
                <select class="filter-select" id="statusFilter" onchange="filterData()">
                    <option value="">全部状态</option>
                    <option value="ongoing">连载中</option>
                    <option value="ended">已完结</option>
                </select>
                <select class="filter-select" id="sortSelect" onchange="sortData()">
                    <option value="missing_desc">缺失集数 ↓</option>
                    <option value="missing_asc">缺失集数 ↑</option>
                    <option value="name_asc">剧名 A-Z</option>
                    <option value="name_desc">剧名 Z-A</option>
                    <option value="year_desc">年份 新→旧</option>
                    <option value="year_asc">年份 旧→新</option>
                </select>
                <select class="filter-select" id="pageSize" onchange="changePageSize()">
                    <option value="20">20 条/页</option>
                    <option value="50" selected>50 条/页</option>
                    <option value="100">100 条/页</option>
                    <option value="200">200 条/页</option>
                </select>
            </div>
            
            <!-- 数据表格 -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th width="60">海报</th>
                            <th width="40">排名</th>
                            <th width="250">剧名</th>
                            <th width="70">年份</th>
                            <th width="70">状态</th>
                            <th width="60">季数</th>
                            <th width="90">缺失集数</th>
                            <th>缺失详情</th>
                            <th width="100">下载进度</th>
                            <th width="100">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="8" class="loading">点击"开始检测"或"刷新列表"加载数据</td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- 分页 -->
            <div class="pagination" id="pagination"></div>
        </div>
        
        <!-- 配置页面 -->
        <div id="settings" class="tab-content">
            <div id="configAlert"></div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Emby 服务器地址</label>
                    <input type="text" id="embyHost" placeholder="http://192.168.1.100:8096">
                </div>
                <div class="form-group">
                    <label>API 密钥</label>
                    <input type="password" id="embyApiKey" placeholder="请输入 API 密钥">
                </div>
            </div>
            
            <div class="form-group">
                <label>
                    <input type="checkbox" id="libraryFilterEnabled" onchange="toggleLibraryList()">
                    启用媒体库过滤
                </label>
                <div id="libraryListContainer" style="display: none;">
                    <div class="library-list" id="libraryList">
                        <div class="loading">加载中...</div>
                    </div>
                    <button class="btn btn-secondary" onclick="loadLibraries()" style="margin-top: 10px;">🔄 刷新媒体库列表</button>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>TMDB API Key（可选）</label>
                    <input type="text" id="tmdbApiKey" placeholder="用于获取更准确的剧集信息">
                </div>
                <div class="form-group">
                    <label>检测间隔（分钟）</label>
                    <input type="number" id="detectionInterval" value="60" min="10">
                </div>
            </div>
            
            <hr style="margin: 25px 0; border: none; border-top: 2px solid #eee;">
            
            <h3 style="margin-bottom: 15px; color: #333;">🎬 MoviePilot 配置</h3>
            
            <div class="form-group">
                <label>
                    <input type="checkbox" id="moviepilotEnabled" onchange="toggleMoviePilotOptions()">
                    启用 MoviePilot 自动下载
                </label>
            </div>
            
            <div id="moviepilotOptions" style="display: none;">
                <div class="form-row">
                    <div class="form-group">
                        <label>MoviePilot 服务器地址</label>
                        <input type="text" id="moviepilotHost" placeholder="http://192.168.1.100:3000">
                    </div>
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="moviepilotUsername" placeholder="admin" value="admin">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="moviepilotPassword" placeholder="请输入登录密码">
                    </div>
                    <div class="form-group">
                        <label>下载保存路径（可选）</label>
                        <input type="text" id="moviepilotDownloadPath" placeholder="/downloads/tv">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="moviepilotAutoDownload" checked>
                        自动下载缺失剧集
                    </label>
                </div>
            </div>
            
            <button class="btn btn-success" onclick="saveConfig()">💾 保存配置</button>
            <button class="btn" onclick="loadConfig()">📥 加载当前配置</button>
        </div>
    </div>
    
    <!-- 详情模态框 -->
    <div class="modal" id="detailModal" onclick="closeModal(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">剧集详情</h2>
                <span class="close-btn" onclick="closeModal(event)">&times;</span>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>
    
    <script>
        let allData = [];
        let filteredData = [];
        let currentPage = 1;
        let pageSize = 50;
        let sortField = 'missing_count';
        let sortDir = 'desc';
        
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
            
            if (tabId === 'settings') {
                loadConfig();
            }
        }
        
        function toggleLibraryList() {
            const enabled = document.getElementById('libraryFilterEnabled').checked;
            document.getElementById('libraryListContainer').style.display = enabled ? 'block' : 'none';
            if (enabled) {
                loadLibraries();
            }
        }
        
        function toggleMoviePilotOptions() {
            const enabled = document.getElementById('moviepilotEnabled').checked;
            document.getElementById('moviepilotOptions').style.display = enabled ? 'block' : 'none';
        }
        
        // 暗黑模式切换
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeToggle').textContent = isDark ? '☀️' : '🌙';
        }
        
        // 初始化主题
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeToggle').textContent = '☀️';
            }
        }
        
        async function loadLibraries() {
            const host = document.getElementById('embyHost').value;
            const apiKey = document.getElementById('embyApiKey').value;
            
            if (!host || !apiKey) {
                showAlert('请先填写 Emby 服务器地址和 API 密钥', 'error');
                return;
            }
            
            const list = document.getElementById('libraryList');
            list.innerHTML = '<div class="loading">加载媒体库中...</div>';
            
            try {
                await fetch('/api/config', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ host, api_key: apiKey })
                });
                
                const res = await fetch('/api/libraries');
                const data = await res.json();
                
                if (data.status === 'success' && data.libraries.length > 0) {
                    let html = '';
                    data.libraries.forEach(lib => {
                        html += `
                            <label class="library-item">
                                <input type="checkbox" value="${lib.id}" class="library-checkbox">
                                <div class="library-info">
                                    <div class="library-name">${lib.name}</div>
                                    <div class="library-path">${lib.locations.join(', ') || '无路径'}</div>
                                </div>
                            </label>
                        `;
                    });
                    list.innerHTML = html;
                } else {
                    list.innerHTML = '<div class="loading">未找到媒体库</div>';
                }
            } catch (e) {
                list.innerHTML = '<div class="loading">加载失败：' + e.message + '</div>';
            }
        }

        async function loadConfig() {
            try {
                const res = await fetch('/api/config');
                const data = await res.json();
                
                if (data.status === 'success') {
                    const config = data.config;
                    document.getElementById('embyHost').value = config.emby.host || '';
                    document.getElementById('embyApiKey').value = config.emby.api_key || '';
                    document.getElementById('tmdbApiKey').value = config.tmdb.api_key || '';
                    document.getElementById('detectionInterval').value = config.detection.interval_minutes || 60;
                    document.getElementById('libraryFilterEnabled').checked = config.libraries.enabled || false;
                    toggleLibraryList();
                    
                    // 加载 MoviePilot 配置
                    const mpConfig = config.moviepilot || {};
                    document.getElementById('moviepilotEnabled').checked = mpConfig.enabled || false;
                    document.getElementById('moviepilotHost').value = mpConfig.host || '';
                    document.getElementById('moviepilotUsername').value = mpConfig.username || 'admin';
                    document.getElementById('moviepilotPassword').value = mpConfig.password || '';
                    document.getElementById('moviepilotAutoDownload').checked = mpConfig.auto_download !== false;
                    document.getElementById('moviepilotDownloadPath').value = mpConfig.download_path || '';
                    toggleMoviePilotOptions();
                    
                    if (config.libraries.enabled && config.libraries.selected_ids) {
                        setTimeout(() => {
                            config.libraries.selected_ids.forEach(id => {
                                const cb = document.querySelector(`.library-checkbox[value="${id}"]`);
                                if (cb) cb.checked = true;
                            });
                        }, 500);
                    }
                    
                    showAlert('配置加载成功', 'success');
                }
            } catch (e) {
                showAlert('加载失败：' + e.message, 'error');
            }
        }
        
        function showAlert(message, type) {
            const alert = document.getElementById('configAlert');
            alert.className = 'alert alert-' + type;
            alert.textContent = message;
            setTimeout(() => alert.textContent = '', 5000);
        }
        
        async function runDetection() {
            const btn = document.getElementById('detectBtn');
            const tbody = document.getElementById('tableBody');
            
            btn.disabled = true;
            btn.textContent = '检测中...';
            tbody.innerHTML = '<tr><td colspan="10" class="loading">正在分析媒体库，这可能需要几分钟...</td></tr>';
            
            try {
                const res = await fetch('/api/detect');
                const data = await res.json();
                
                if (data.status === 'success') {
                    document.getElementById('totalSeries').textContent = data.stats.total_series.toLocaleString();
                    document.getElementById('missingSeries').textContent = data.stats.series_with_missing.toLocaleString();
                    document.getElementById('totalMissing').textContent = data.stats.total_missing_episodes.toLocaleString();
                    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
                    loadData();
                }
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="10" class="loading">检测失败：' + e.message + '</td></tr>';
            }
            
            btn.disabled = false;
            btn.textContent = '🔍 开始检测';
        }
        
        async function loadData() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="10" class="loading">加载数据中...</td></tr>';
            
            try {
                // 先尝试从数据库加载最近的检测结果
                const res = await fetch('/api/last-detection');
                const data = await res.json();
                
                if (data.status === 'success' && data.cards && data.cards.length > 0) {
                    allData = data.cards;
                    filterData();
                    
                    // 更新统计信息
                    document.getElementById('totalSeries').textContent = data.stats.total_series.toLocaleString();
                    document.getElementById('missingSeries').textContent = data.stats.series_with_missing.toLocaleString();
                    document.getElementById('totalMissing').textContent = data.stats.total_missing_episodes.toLocaleString();
                    
                    // 显示加载来源提示
                    if (data.from_cache) {
                        const detectTime = new Date(data.detection_time).toLocaleString('zh-CN');
                        const hint = document.createElement('div');
                        hint.style.cssText = 'background: #fff3cd; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; color: #856404;';
                        hint.innerHTML = `ℹ️ 已加载缓存数据（检测时间：${detectTime}）<button class="btn btn-sm" style="margin-left: 10px;" onclick="runDetection()">🔄 重新检测</button>`;
                        const controls = document.querySelector('.controls');
                        if (controls && !controls.querySelector('div[style*="background: #fff3cd"]')) {
                            controls.insertBefore(hint, controls.firstChild);
                        }
                    }
                } else if (data.status === 'no_data') {
                    tbody.innerHTML = '<tr><td colspan="10" class="loading">暂无检测结果，请先点击"开始检测"</td></tr>';
                } else {
                    tbody.innerHTML = '<tr><td colspan="10" class="loading">没有缺失剧集的记录 🎉</td></tr>';
                }
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="10" class="loading">加载失败：' + e.message + '</td></tr>';
            }
        }
        
        function filterData() {
            const searchText = document.getElementById('searchBox').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            
            filteredData = allData.filter(item => {
                const matchSearch = !searchText || item.series_name.toLowerCase().includes(searchText);
                const matchStatus = !statusFilter || item.status === statusFilter;
                return matchSearch && matchStatus;
            });
            
            sortData();
        }
        
        function sortData() {
            const sortValue = document.getElementById('sortSelect').value;
            const parts = sortValue.split('_');
            sortField = parts[0];
            sortDir = parts[1];
            
            filteredData.sort((a, b) => {
                let aVal = a[sortField];
                let bVal = b[sortField];
                
                if (sortField === 'year') {
                    aVal = parseInt(aVal) || 0;
                    bVal = parseInt(bVal) || 0;
                }
                
                if (sortDir === 'asc') {
                    return aVal > bVal ? 1 : -1;
                } else {
                    return aVal < bVal ? 1 : -1;
                }
            });
            
            currentPage = 1;
            renderTable();
        }
        
        function changePageSize() {
            pageSize = parseInt(document.getElementById('pageSize').value);
            currentPage = 1;
            renderTable();
        }
        
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filteredData.slice(start, end);
            
            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" class="loading">没有符合条件的数据</td></tr>';
                renderPagination();
                return;
            }
            
            let html = '';
            pageData.forEach((item, index) => {
                const rank = start + index + 1;
                const statusClass = item.status === 'ongoing' ? 'status-ongoing' : 'status-ended';
                const statusText = item.status === 'ongoing' ? '连载中' : '已完结';
                const posterUrl = item.poster || 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2250%22 height=%2275%22><rect fill=%22%23e8e8e8%22 width=%2250%22 height=%2275%22/><text fill=%22%23999%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2210%22>无海报</text></svg>';
                
                // 生成缺失详情文本 - 优化显示
                let missingDetail = '';
                if (item.seasons && item.seasons.length > 0) {
                    // 统计有缺集的季数
                    const seasonsWithMissing = item.seasons.filter(s => s.missing_episodes && s.missing_episodes.length > 0);
                    
                    if (seasonsWithMissing.length > 0) {
                        // 方案 1：紧凑显示 - 所有季合并显示
                        const allMissingEps = [];
                        seasonsWithMissing.forEach(s => {
                            s.missing_episodes.forEach(ep => {
                                allMissingEps.push({season: s.season_number, ep: ep});
                            });
                        });
                        
                        // 按季分组显示
                        const bySeason = {};
                        allMissingEps.forEach(item => {
                            const key = `S${String(item.season).padStart(2, '0')}`;
                            if (!bySeason[key]) bySeason[key] = [];
                            bySeason[key].push(item.ep);
                        });
                        
                        missingDetail = Object.entries(bySeason).map(([season, eps]) => {
                            const displayEps = eps.length > 15 ? 
                                eps.slice(0, 15).join(', ') + `... 等${eps.length}集` : 
                                eps.join(', ');
                            return `<div style="margin-bottom: 3px; padding: 2px 6px; background: #fff5f5; border-radius: 3px;">
                                <strong style="color: #ff4757; margin-right: 6px;">${season}</strong>
                                <span style="color: #666;">${displayEps}</span>
                            </div>`;
                        }).join('');
                    } else {
                        // 有季数据但没有缺失集数
                        missingDetail = `<div style="color: #28a745; font-weight: 500;">✓ 本季完整</div>`;
                    }
                } else {
                    // 没有季数据
                    missingDetail = `<div style="color: #999; font-style: italic;">暂无季数据</div>`;
                }
                
                // 获取下载状态（从 download_status 字段，如果没有则默认为 pending）
                const downloadStatus = item.download_status || 'pending';
                const statusLabels = {
                    'pending': '⏳ 待推送',
                    'downloading': '⏳ 下载中',
                    'completed': '✅ 已推送',
                    'failed': '❌ 失败'
                };
                const statusClassMap = {
                    'pending': 'status-pending',
                    'downloading': 'status-downloading',
                    'completed': 'status-completed',
                    'failed': 'status-failed'
                };
                
                html += `
                    <tr>
                        <td><img class="poster-thumb" src="${posterUrl}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2250%22 height=%2275%22><rect fill=%22%23ddd%22 width=%2250%22 height=%2275%22/><text fill=%22%23999%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 font-size=%2210%22>无海报</text></svg>'" alt="海报"></td>
                        <td><strong>#${rank}</strong></td>
                        <td><strong>${item.series_name}</strong></td>
                        <td>${item.year || '-'}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>${item.total_seasons}</td>
                        <td><span class="missing-badge">${item.missing_count.toLocaleString()}</span></td>
                        <td><div style="max-height: 80px; overflow-y: auto; font-size: 12px; line-height: 1.6; color: #666;">${missingDetail || '-'}</div></td>
                        <td><span class="download-status ${statusClassMap[downloadStatus] || 'status-pending'}">${statusLabels[downloadStatus] || '⏳ 待下载'}</span></td>
                        <td>
                            <button class="action-btn action-btn-view" onclick="showDetail(${start + index})">详情</button>
                            <button class="action-btn action-btn-download ${downloadStatus === 'completed' ? 'btn-disabled' : ''}" 
                                onclick="pushDownload(${start + index})" 
                                ${downloadStatus === 'completed' || downloadStatus === 'downloading' ? 'disabled' : ''}>
                                ${downloadStatus === 'completed' ? '✅' : downloadStatus === 'downloading' ? '⏳' : '⬇️'}
                            </button>
                        </td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = html;
            renderPagination();
        }
        
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(filteredData.length / pageSize);
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = `
                <button class="page-btn" onclick="goToPage(1)" ${currentPage === 1 ? 'disabled' : ''}>首页</button>
                <button class="page-btn" onclick="goToPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>
            `;
            
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, currentPage + 2);
            
            for (let i = startPage; i <= endPage; i++) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            
            html += `
                <button class="page-btn" onclick="goToPage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>
                <button class="page-btn" onclick="goToPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>末页</button>
            `;
            
            html += `<span style="padding: 8px; color: #666;">共 ${filteredData.length} 条，${totalPages} 页</span>`;
            
            pagination.innerHTML = html;
        }
        
        function goToPage(page) {
            const totalPages = Math.ceil(filteredData.length / pageSize);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
        }
        
        function showDetail(localIndex) {
            const card = filteredData[localIndex];
            document.getElementById('modalTitle').textContent = card.series_name;
            const body = document.getElementById('modalBody');
            
            const statusText = card.status === 'ongoing' ? '连载中' : '已完结';
            
            let html = `
                <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                    <img src="${card.poster || ''}" style="width: 150px; height: 225px; object-fit: cover; border-radius: 8px;" onerror="this.style.display='none'">
                    <div>
                        <p><strong>年份：</strong>${card.year || '-'}</p>
                        <p><strong>状态：</strong><span class="status-badge ${card.status === 'ongoing' ? 'status-ongoing' : 'status-ended'}">${statusText}</span></p>
                        <p><strong>缺失集数：</strong><span class="missing-badge">${card.missing_count.toLocaleString()}集</span></p>
                        <p><strong>总季数：</strong>${card.total_seasons}季</p>
                        ${card.tmdb_id ? `<p><strong>TMDB ID：</strong>${card.tmdb_id}</p>` : ''}
                    </div>
                </div>
                <h3 style="margin-bottom: 15px;">缺失详情</h3>
                <div class="season-list">
            `;
            
            card.seasons.forEach(season => {
                const eps = season.missing_episodes;
                const displayEps = eps.length > 50 ? eps.slice(0, 50).join(', ') + `... 共${eps.length}集` : eps.join(', ');
                html += `
                    <div class="season-item">
                        <div class="season-title">第${season.season_number}季 - 缺失${eps.length.toLocaleString()}集</div>
                        <div class="missing-eps">${displayEps}</div>
                    </div>
                `;
            });
            
            html += '</div>';
            body.innerHTML = html;
            document.getElementById('detailModal').style.display = 'flex';
        }
        
        function closeModal(event) {
            if (event.target.id === 'detailModal' || event.target.className === 'close-btn') {
                document.getElementById('detailModal').style.display = 'none';
            }
        }
        
        async function pushDownload(localIndex) {
            const item = filteredData[localIndex];
            if (!item) return;
            
            // 获取所有缺失的季
            const seasonsToDownload = item.seasons.filter(s => s.missing_episodes && s.missing_episodes.length > 0);
            if (seasonsToDownload.length === 0) {
                alert('该剧集没有缺失的集数');
                return;
            }
            
            // 计算总缺失集数
            const totalMissingEps = seasonsToDownload.reduce((sum, s) => sum + s.missing_episodes.length, 0);
            
            if (!confirm(`确定要推送 "${item.series_name}" 到 MoviePilot 下载吗？\n缺失集数：${totalMissingEps} 集`)) {
                return;
            }
            
            try {
                let successCount = 0;
                // 推送每一季（只推送缺失的集数）
                for (const season of seasonsToDownload) {
                    const response = await fetch('/api/download', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            series_id: item.series_id,
                            series_name: item.series_name,
                            season: season.season_number,
                            episodes: season.missing_episodes  // 只传递缺失的集数
                        })
                    });
                    
                    const result = await response.json();
                    if (result.status === 'success') {
                        successCount++;
                    }
                }
                
                alert(`✅ 已成功推送 ${successCount}/${seasonsToDownload.length} 个季到 MoviePilot\n\nMoviePilot 会自动识别已存在的集数，只下载缺失的集数，不会重复下载！`);
                
                // 更新本地状态
                item.download_status = 'completed';
                renderTable();
                
            } catch (e) {
                alert('推送失败：' + e.message);
            }
        }
        
        // 页面加载时初始化主题
        initTheme();
        
        // 页面加载时尝试加载数据
        loadData();
    </script>
</body>
</html>
